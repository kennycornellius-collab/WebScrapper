name: Forex Factory Weekly Scraper

# This tells GitHub WHEN to run the script
on:
  schedule:
    # Runs at 00:00 UTC every Monday (Which is Monday morning WIB for you)
    - cron: '0 0 * * 1'
  workflow_dispatch: 
    # This magic line adds a "Run Workflow" button in GitHub so you can test it manually!

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest # Spins up a Linux cloud server

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 pandas
          playwright install chromium
          
      - name: Run the Scraper
        run: python scraper.py
        
      - name: Commit and Push the New Data
        run: |
          # Configure the git user as a GitHub Actions bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the new CSV files and commit them
          git add .
          # If there is no new data, it won't crash
          git commit -m "data: auto-update weekly forex calendar" || exit 0
          git push